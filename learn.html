<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Hub - CyberEDT Documentation</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Developer documentation for cryptographic hashing. Learn about SHA-256, MD5, and security best practices." />
  <meta name="keywords"
    content="hashing, cryptography, sha256, sha512, md5, sha1, base64, avalanche effect, cybersecurity education" />
  <meta name="author" content="CyberEDT" />

  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .font-mono {
      font-family: 'Share Tech Mono', monospace;
    }

    /* Layout Baseline */
    #sidebar {
      width: 280px;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      border-right: 1px solid rgba(0,0,0,0.1);
      z-index: 50;
      background: #ffffff;
      transition: transform 0.3s ease;
    }

    .dark #sidebar {
      background: #0a0a0a;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    main {
      margin-left: 280px;
      min-height: 100vh;
      background: #f9fafb;
    }

    .dark main {
      background: #050505;
    }

    /* Mobile Overrides */
    @media (max-width: 1023px) {
      #sidebar {
        transform: translateX(-100%);
        width: 300px;
      }
      #sidebar.show {
        transform: translateX(0);
        box-shadow: 20px 0 50px rgba(0,0,0,0.2);
      }
      main {
        margin-left: 0 !important;
      }
    }
  </style>
</head>

<body
  class="has-cyber-cursor bg-gray-50 dark:bg-cyber-black text-gray-800 dark:text-gray-200 font-cyber antialiased transition-colors duration-300">

  <!-- Unified Mobile Navbar -->
  <header class="lg:hidden sticky top-0 z-40 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button id="mobile-menu-btn" class="p-2 text-gray-400 hover:text-gray-900 dark:text-gray-100 transition-colors">
        <i class="fas fa-bars"></i>
      </button>
      <span id="active-topic-name" class="text-xs font-black uppercase tracking-widest text-gray-900 dark:text-white">Fundamentals</span>
    </div>
    <button id="mobile-theme-toggle" class="p-2 text-gray-400 hover:text-yellow-400 transition-colors">
      <i class="fas fa-sun dark:hidden text-sm"></i>
      <i class="fas fa-moon hidden dark:block text-sm"></i>
    </button>
  </header>

  <!-- Sidebar (Subjects merged with Nav actions) -->
  <aside id="sidebar">
    <div class="flex flex-col h-full p-8">
      
      <!-- Back Link -->
      <a href="index.html" class="flex items-center gap-3 mb-10 text-gray-500 hover:text-cyber-blue transition-colors group">
        <div class="w-10 h-10 rounded-full bg-gray-50 dark:bg-white/5 flex items-center justify-center border border-gray-100 dark:border-gray-800 group-hover:border-cyber-blue/50 transition-all">
            <i class="fas fa-arrow-left text-sm"></i>
        </div>
        <span class="text-base font-black uppercase tracking-widest">Back to Tool</span>
      </a>

      <!-- Subjects Label -->
      <div class="mb-6 text-sm font-black uppercase tracking-[0.25em] text-gray-400">
        Subjects
      </div>
      
      <!-- Navigation -->
      <nav class="space-y-1 flex-1">
        <button data-target="tool-docs" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Tool Documentation
        </button>
        <button data-target="fundamentals" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Fundamentals
        </button>
        <button data-target="why-hashing" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Why Hashing
        </button>
        <button data-target="algorithms" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Algorithms
        </button>
        <button data-target="encryption" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          vs Encryption
        </button>
        <button data-target="practices" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Best Practices
        </button>
        <button data-target="avalanche" class="nav-item w-full px-4 py-3.5 rounded-xl transition-all text-base font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 text-left">
          Avalanche Demo
        </button>
      </nav>


    </div>
  </aside>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm"></div>

  <!-- Main Content Wrapper -->
  <main class="relative">
    <!-- Desktop Search or other header elements could go here -->
    
    <div id="content-panel" class="max-w-4xl mx-auto px-6 py-12 md:py-24 lg:px-24 opacity-0 translate-y-3 transition-all duration-200">
      <!-- Injected by scripts -->
    </div>
  </main>

  <script type="module" src="./learn.js"></script>

  <!-- Cyber Cursor (isolated) -->
  <div class="cyber-cursor"></div>
  <div class="cyber-cursor-ring"></div>
  <script src="/cursor.js" defer></script>
</body>

</html>
